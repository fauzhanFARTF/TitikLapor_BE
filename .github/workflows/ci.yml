name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  # Memungkinkan dijalankan manual dari tab Actions.
  workflow_dispatch:

# Run lama pada branch yang sama dibatalkan saat ada push baru — tidak ada
# gunanya menunggu hasil commit yang sudah tergantikan.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Kualitas kode: cepat, tidak butuh database ─────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements/*.txt

      - name: Pasang ruff & black
        # Versinya dibaca dari requirements agar CI dan mesin lokal memakai
        # formatter yang sama persis — beda versi black berarti beda hasil.
        run: |
          pip install "$(grep -E '^ruff==' requirements/development.txt)" \
                      "$(grep -E '^black==' requirements/development.txt)"

      - name: Ruff
        run: ruff check --output-format=github config core users reports spatial tests manage.py

      - name: Black
        run: black --check --diff config core users reports spatial tests manage.py

  # ── Pengujian: butuh PostGIS ───────────────────────────────────────────────
  test:
    name: Pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        # 3.12 = versi yang dipakai Dockerfile produksi.
        python-version: ['3.12']

    services:
      postgres:
        image: postgis/postgis:17-3.5
        env:
          POSTGRES_DB: titiklapor
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        # Job menunggu sampai Postgres benar-benar siap menerima koneksi.
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DJANGO_ENV: development
      SECRET_KEY: kunci-khusus-ci-bukan-untuk-produksi
      DB_NAME: titiklapor
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: localhost
      DB_PORT: 5432
      DB_SSLMODE: prefer

    steps:
      - uses: actions/checkout@v4

      - name: Pasang pustaka geospasial
        # GeoDjango menautkan GDAL/GEOS/PROJ saat runtime; tanpa paket ini
        # seluruh app yang memakai django.contrib.gis gagal diimpor.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gdal-bin libgdal-dev libgeos-dev libproj-dev

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements/*.txt

      - name: Pasang dependensi
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/development.txt

      - name: Django system check
        run: python manage.py check

      - name: Pastikan tidak ada migrasi tertinggal
        # Menangkap perubahan model yang lupa dibuatkan migrasinya — kalau
        # lolos, deploy akan gagal saat migrate di produksi.
        run: python manage.py makemigrations --check --dry-run

      - name: Pytest
        run: pytest --cov=. --cov-report=term-missing --cov-report=xml

      - name: Unggah laporan coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 14

  # ── Image produksi harus benar-benar bisa dibangun ─────────────────────────
  docker:
    name: Build image
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Build Dockerfile
        # Hanya membangun, tidak push. Tujuannya menangkap kesalahan pada
        # Dockerfile atau requirements produksi sedini mungkin.
        run: docker build -t titiklapor-api:ci .
